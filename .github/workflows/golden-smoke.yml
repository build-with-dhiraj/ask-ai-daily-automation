name: Golden judge smoke (Monday)

on:
  schedule:
    - cron: '30 3 * * 1'   # 09:00 IST Mondays
  workflow_dispatch:

jobs:
  golden:
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install openai langfuse

      - name: Run golden smoke
        run: python3 golden_smoke.py
        env:
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
          AZURE_API_VERSION: ${{ secrets.AZURE_API_VERSION }}
          DEPLOYMENT_NAME: ${{ secrets.DEPLOYMENT_NAME }}

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then echo "No Slack webhook; skip notify"; exit 0; fi
          curl -sS -X POST -H 'Content-type: application/json' \
            --data '{"text":":rotating_light: *Golden judge smoke FAILED* — check Actions run '"${{ github.run_id }}"'"}' \
            "$SLACK_WEBHOOK_URL"
