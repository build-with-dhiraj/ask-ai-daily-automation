# Daily Digest — requires these Actions *repository* secrets (names must match exactly):
#   METABASE_URL, METABASE_API_KEY
#   LANGFUSE_PUBLIC_KEY, LANGFUSE_SECRET_KEY, LANGFUSE_HOST
#   SLACK_WEBHOOK_URL
# Optional Metabase card ids (digits only in secrets — canonical PW prod questions):
#   METABASE_BEHAVIOR_FOLLOWUP_CARD_ID → 33282
#     https://metabase-prod.penpencil.co/question/33282-metabase-behavior-followup-card
#   METABASE_BEHAVIOR_REPHRASE_CARD_ID → 33283
#     https://metabase-prod.penpencil.co/question/33283-metabase-behavior-rephrase-card
#   METABASE_STREAM_LOGS_CARD_ID → 33285
#     https://metabase-prod.penpencil.co/question/33285-metabase-stream-logs-card
# Secrets under Settings are not visible to Python until listed under `env:` below.

name: Daily Digest

on:
  # Schedule moved to daily-automation.yml. Use workflow_dispatch for ad-hoc runs.
  workflow_dispatch:

# Shares the queue with daily-automation.yml + daily-eval.yml so the single
# self-hosted Mac runner never has two of these in flight at once. A second
# dispatch QUEUES; it does not cancel an in-progress run. See RUNBOOK.md.
concurrency:
  group: daily-automation
  cancel-in-progress: false

jobs:
  digest:
    runs-on: self-hosted
    # Bumped 180 → 240 to match daily-automation.yml — accommodates the new
    # retry-tail budget across Metabase + Langfuse + Slack.
    timeout-minutes: 240
    env:
      PYTHONUNBUFFERED: "1"
      METABASE_URL: ${{ secrets.METABASE_URL }}
      METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
      # Bumped 20 → 120s: SDK HTTP timeout for score REST writes. The
      # previous 20s tripped under incident-day Langfuse Cloud slowness.
      LANGFUSE_TIMEOUT: "120"
      # Disable the SDK's auto-initialised OTLP trace exporter. We never call
      # @observe(), so the exporter only produces noise. Langfuse REST reads
      # (observations, scores) are unaffected.
      # See https://github.com/langfuse/langfuse-python/blob/v3.7.0/langfuse/_client/environment_variables.py
      LANGFUSE_TRACING_ENABLED: "false"
      SLACK_WEBHOOK_URL: ${{ github.event_name == 'schedule' && secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL_TEST }}
      SLACK_TARGET: ${{ github.event_name == 'schedule' && 'prod' || 'staging' }}
      EVAL_SUMMARY_PATH: /tmp/daily_eval_yesterday_summary.json
      METABASE_BEHAVIOR_FOLLOWUP_CARD_ID: ${{ secrets.METABASE_BEHAVIOR_FOLLOWUP_CARD_ID }}
      METABASE_BEHAVIOR_REPHRASE_CARD_ID: ${{ secrets.METABASE_BEHAVIOR_REPHRASE_CARD_ID }}
      METABASE_STREAM_LOGS_CARD_ID: ${{ secrets.METABASE_STREAM_LOGS_CARD_ID }}
      # Phase 1 digest restructure: digest now calls Azure OpenAI gpt-4.1 for the
      # "Top 3 Insights" section. Same secret names as eval/classifier — no new
      # secrets needed. The LLM call is best-effort; any failure falls back to
      # a placeholder and the digest still posts.
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_API_KEY }}
      DEPLOYMENT_NAME: ${{ secrets.DEPLOYMENT_NAME }}
      # Flipped 1 → 0 (2026-05-12): degraded post is preferred over silent miss.
      # Mirrors the change in daily-automation.yml; see commentary there.
      DIGEST_FAIL_ON_LANGFUSE_ERROR: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Verify behaviour Metabase env (values not printed)
        shell: bash
        run: |
          check_digits_if_set() {
            name="$1"
            raw="${!name}"
            stripped="${raw#"${raw%%[![:space:]]*}"}"
            stripped="${stripped%"${stripped##*[![:space:]]}"}"
            if [[ -z "$stripped" ]]; then
              return
            fi
            if ! [[ "$stripped" =~ ^[0-9]+$ ]]; then
              echo "::warning::${name} must be digits-only (Metabase card id). Check the secret value for quotes or hidden characters."
            fi
          }
          check_digits_if_set METABASE_BEHAVIOR_FOLLOWUP_CARD_ID
          check_digits_if_set METABASE_BEHAVIOR_REPHRASE_CARD_ID
          check_digits_if_set METABASE_STREAM_LOGS_CARD_ID

      - name: Download yesterday's digest snapshot (optional)
        # First-ever run: no artifact exists → continue-on-error keeps the job
        # alive so the digest still posts (Top 3 Insights renders the
        # "(insights begin tomorrow once a baseline exists)" placeholder).
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: digest-snapshot
          path: /tmp/digest_snapshot_download

      - name: Place digest snapshot for digest read
        if: always()
        shell: bash
        run: |
          src="/tmp/digest_snapshot_download/daily_digest_yesterday_summary.json"
          if [[ -f "$src" ]]; then
            cp "$src" "/tmp/daily_digest_yesterday_summary.json"
            echo "[info] Yesterday's digest snapshot placed at /tmp/daily_digest_yesterday_summary.json"
          else
            echo "[info] No yesterday digest snapshot — Top 3 Insights will use first-run placeholder"
          fi

      - name: Install Python deps for Top 3 Insights LLM call
        # Phase 1 digest restructure: digest now uses the openai SDK for Azure
        # OpenAI gpt-4.1 calls (Top 3 Insights). Mirrors the install in
        # daily-automation.yml's eval job.
        run: pip3 install openai langfuse

      - name: Run daily digest
        run: python3 daily_digest.py

      - name: Upload today's digest snapshot for tomorrow
        # Phase 1 digest restructure: today's digest writes a compact JSON
        # snapshot which tomorrow's digest job downloads to compute Top 3
        # Insights day-on-day deltas. `if: always()` so a failed Slack post
        # still hands off the snapshot.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: digest-snapshot
          path: /tmp/daily_digest_yesterday_summary.json
          if-no-files-found: ignore
          retention-days: 2
