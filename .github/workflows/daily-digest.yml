name: Daily Digest

on:
  schedule:
    - cron: '0 4 * * *'   # 09:30 IST every day
  workflow_dispatch:

jobs:
  digest:
    runs-on: self-hosted
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Run daily digest
        run: python3 daily_digest.py
        env:
          METABASE_URL: ${{ secrets.METABASE_URL }}
          METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          EVAL_SUMMARY_PATH: /tmp/daily_eval_yesterday_summary.json
          METABASE_BEHAVIOR_FOLLOWUP_CARD_ID: ${{ secrets.METABASE_BEHAVIOR_FOLLOWUP_CARD_ID }}
          METABASE_BEHAVIOR_REPHRASE_CARD_ID: ${{ secrets.METABASE_BEHAVIOR_REPHRASE_CARD_ID }}
          # Fallback if secret was saved as METABASE_BEHAVIOR_REPHRASE_CARD (no _ID)
          METABASE_BEHAVIOR_REPHRASE_CARD: ${{ secrets.METABASE_BEHAVIOR_REPHRASE_CARD }}
          # E2E video-co-pilot lifecycle summary — sql/vcp_stream_logs_digest_summary.sql
          METABASE_STREAM_LOGS_CARD_ID: ${{ secrets.METABASE_STREAM_LOGS_CARD_ID }}
