# Run this with your Mac off: it uses GitHub-hosted runners + repository *secrets* only.
# Proves Metabase + Langfuse are reachable from GitHub egress with your keys (not from your laptop).
#
# Repo → Settings → Secrets and variables → Actions (METABASE_URL, METABASE_API_KEY, etc.)

name: GitHub-hosted connectivity smoke

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      METABASE_URL: ${{ secrets.METABASE_URL }}
      METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
      # Same card family as daily_digest academic reasons; change if your instance differs.
      METABASE_SMOKE_CARD_ID: "24973"
    steps:
      - name: Probe Metabase and Langfuse (GitHub egress)
        shell: bash
        run: |
          set -euo pipefail

          MB_URL="${METABASE_URL:?Set Actions secret METABASE_URL}"
          MB_KEY="${METABASE_API_KEY:?Set Actions secret METABASE_API_KEY}"
          LF_PK="${LANGFUSE_PUBLIC_KEY:?Set Actions secret LANGFUSE_PUBLIC_KEY}"
          LF_SK="${LANGFUSE_SECRET_KEY:?Set Actions secret LANGFUSE_SECRET_KEY}"

          LF_H="${LANGFUSE_HOST:-}"
          if [[ -z "${LF_H// }" ]]; then
            LF_H="https://cloud.langfuse.com"
          fi

          echo "Metabase base: ${MB_URL}"
          echo "Langfuse host: ${LF_H}"

          echo "::group::Metabase GET /api/user/current"
          code="$(curl -sS -o /tmp/mb_user.json -w "%{http_code}" --max-time 30 \
            -H "X-Api-Key: ${MB_KEY}" \
            -H "Content-Type: application/json" \
            "${MB_URL}/api/user/current")"
          echo "HTTP ${code}"
          head -c 400 /tmp/mb_user.json || true
          echo
          [[ "${code}" == "200" ]] || { echo "::error::Metabase user/current failed"; exit 1; }
          echo "::endgroup::"

          echo "::group::Metabase POST /api/card/${METABASE_SMOKE_CARD_ID}/query/json"
          code="$(curl -sS -o /tmp/mb_card.json -w "%{http_code}" --max-time 120 \
            -X POST \
            -H "X-Api-Key: ${MB_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${MB_URL}/api/card/${METABASE_SMOKE_CARD_ID}/query/json")"
          echo "HTTP ${code}"
          head -c 400 /tmp/mb_card.json || true
          echo
          [[ "${code}" == "200" ]] || { echo "::error::Metabase card query failed"; exit 1; }
          echo "::endgroup::"

          echo "::group::Langfuse GET /api/public/traces"
          FROM_TS="$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)"
          code="$(curl -sS -o /tmp/lf_traces.json -w "%{http_code}" --max-time 45 \
            -u "${LF_PK}:${LF_SK}" \
            -G "${LF_H}/api/public/traces" \
            --data-urlencode "fromTimestamp=${FROM_TS}" \
            --data-urlencode "limit=1")"
          echo "HTTP ${code}"
          head -c 400 /tmp/lf_traces.json || true
          echo
          [[ "${code}" == "200" ]] || { echo "::error::Langfuse traces failed"; exit 1; }
          echo "::endgroup::"

          echo "OK — GitHub-hosted runner reached Metabase + Langfuse with repo secrets."
