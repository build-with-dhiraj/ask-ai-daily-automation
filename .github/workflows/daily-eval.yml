name: Daily Eval

on:
  # Schedule moved to daily-automation.yml (eval → digest + artifact). Use workflow_dispatch for ad-hoc runs.
  workflow_dispatch:
    inputs:
      poster_disable:
        description: 'Skip the poster pipeline for THIS run only (incident kill-switch, per-run scope). For a sticky rollback across all runs, set the repo variable POSTER_DISABLE=1 instead, see docs/runbooks/poster-rollback.md.'
        required: false
        default: false
        type: boolean

# Shares the queue with daily-automation.yml + daily-digest.yml so the single
# self-hosted Mac runner never has two of these in flight at once. A second
# dispatch QUEUES; it does not cancel an in-progress run. See RUNBOOK.md.
concurrency:
  group: daily-automation
  cancel-in-progress: false

jobs:
  eval:
    runs-on: self-hosted
    # scripts/poster_publisher.py pushes the scoreboard poster to gh-pages.
    # Default GITHUB_TOKEN is contents:read which 403s on push. Mirror the
    # pattern from prune-posters.yml. Mirrors daily-automation.yml's eval job.
    permissions:
      contents: write
    # Must exceed EVAL_MAX_RUNTIME_SEC/60 + margin or artifact/finalize steps hit 403 after job seal.
    timeout-minutes: 600
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install openai langfuse

      - name: Run daily eval
        run: python3 daily_eval.py
        env:
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
          AZURE_API_VERSION: ${{ secrets.AZURE_API_VERSION }}
          DEPLOYMENT_NAME: ${{ secrets.DEPLOYMENT_NAME }}
          METABASE_URL: ${{ secrets.METABASE_URL }}
          METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
          METABASE_QUESTION_ID: ${{ secrets.METABASE_QUESTION_ID }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          # Bumped 20 → 120s: SDK HTTP timeout for score REST writes. The
          # previous 20s was tight enough that incident-day Langfuse Cloud
          # slowness caused score-write retries to compound.
          LANGFUSE_TIMEOUT: "120"
          # Disable the SDK's auto-initialised OTLP trace exporter. We never call
          # @observe(), so the exporter only produces "Failed to export span batch"
          # noise. Score writes (create_score) use REST and are unaffected.
          # See https://github.com/langfuse/langfuse-python/blob/v3.7.0/langfuse/_client/environment_variables.py
          LANGFUSE_TRACING_ENABLED: "false"
          SLACK_WEBHOOK_URL: ${{ github.event_name == 'schedule' && secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL_TEST }}
          SLACK_TARGET: ${{ github.event_name == 'schedule' && 'prod' || 'staging' }}
          # Bumped 90 → 300s: per-LLM-call HTTP timeout. A 90s cap meant a
          # single sticky Azure call would error out (ERROR sample) rather than
          # ride out a transient slow response.
          JUDGE_HTTP_TIMEOUT_SEC: "300"
          JUDGE_CONCURRENCY: "16"
          # 0 = no soft cap; run to completion. The job's timeout-minutes: 600 (10h)
          # is the runaway backstop. Previously 14400 (4h), but daily-eval has no
          # hard duration requirement.
          EVAL_MAX_RUNTIME_SEC: "0"
          # Poster publish gating: this workflow is workflow_dispatch only, so
          # there is no `dry_run` input. Default to NO push so manual eval
          # dispatches never accidentally write to gh-pages.
          POSTER_AUTO_PUSH: "0"
          # Per-run poster kill-switch (SRE items 3+8). See
          # docs/runbooks/poster-rollback.md for the two rollback paths.
          POSTER_DISABLE: ${{ github.event.inputs.poster_disable == 'true' && '1' || vars.POSTER_DISABLE || '' }}
