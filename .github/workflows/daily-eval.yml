name: Daily Eval

on:
  # Schedule moved to daily-automation.yml (eval → digest + artifact). Use workflow_dispatch for ad-hoc runs.
  workflow_dispatch:

# Shares the queue with daily-automation.yml + daily-digest.yml so the single
# self-hosted Mac runner never has two of these in flight at once. A second
# dispatch QUEUES; it does not cancel an in-progress run. See RUNBOOK.md.
concurrency:
  group: daily-automation
  cancel-in-progress: false

jobs:
  eval:
    runs-on: self-hosted
    # Must exceed EVAL_MAX_RUNTIME_SEC/60 + margin or artifact/finalize steps hit 403 after job seal.
    timeout-minutes: 600
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install openai langfuse

      - name: Run daily eval
        run: python3 daily_eval.py
        env:
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
          AZURE_API_VERSION: ${{ secrets.AZURE_API_VERSION }}
          DEPLOYMENT_NAME: ${{ secrets.DEPLOYMENT_NAME }}
          METABASE_URL: ${{ secrets.METABASE_URL }}
          METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
          METABASE_QUESTION_ID: ${{ secrets.METABASE_QUESTION_ID }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # Per-request LLM HTTP timeout (seconds); after this, sample is logged ERROR and run continues
          JUDGE_HTTP_TIMEOUT_SEC: "300"
          JUDGE_CONCURRENCY: "8"
          EVAL_MAX_RUNTIME_SEC: "14400"
