# Orchestrated daily run: Daily Eval then Daily Digest on one schedule.
# Passes eval snapshot JSON via artifact so digest always sees formatting_hotspot_chapters
# even when eval and digest land on different self-hosted runners.
#
# Standalone workflows (daily-eval.yml, daily-digest.yml) are workflow_dispatch only — use this for cron.

name: Daily Automation

on:
  schedule:
    # 03:00 UTC == 08:30 IST (UTC+5:30); digest runs after eval on same workflow.
    # Why 03:00 UTC: silver ETL for astracdc.silver_conversational_query_table
    # (used by eval Q33193) lands at ~00:55 UTC each day; central.silver_stream_logs
    # (used by digest Q33285) lands at ~02:08 UTC. 03:00 UTC gives 125-min buffer
    # on silver and 52-min on stream_logs, and Trino UTC `CURRENT_DATE - 1` aligns
    # with Python `date.today() - 1` (Mac in IST) at this hour. Verified empirically
    # 2026-05-11 across 4 days of historical cdp_ingested_at timestamps.
    - cron: '0 3 * * *'
  workflow_dispatch:

# Single-queue across Daily Automation + Daily Eval + Daily Digest so the one
# self-hosted Mac runner never has overlapping work. A second dispatch QUEUES;
# the in-progress run is NOT cancelled. See RUNBOOK.md for operator behaviour.
concurrency:
  group: daily-automation
  cancel-in-progress: false

jobs:
  eval:
    name: Daily Eval
    runs-on: self-hosted
    # Hard cap for the WHOLE job (all steps). Must exceed EVAL_MAX_RUNTIME_SEC/60 plus Metabase,
    # finalize, Langfuse flush, normalize, and artifact upload—or GitHub ends the job and
    # upload-artifact fails with: (403) Forbidden: job is completed.
    timeout-minutes: 600
    steps:
      - uses: actions/checkout@v4

      - name: Show Slack target
        env:
          SLACK_TARGET: ${{ github.event_name == 'schedule' && 'prod' || 'staging' }}
        run: |
          echo "📨 Slack target: $(echo "$SLACK_TARGET" | tr '[:lower:]' '[:upper:]') (event: ${{ github.event_name }})"

      - name: Install dependencies
        run: pip3 install openai langfuse

      - name: Run daily eval
        run: python3 daily_eval.py
        # Tuning rationale (set 2026-05-11):
        # - JUDGE_CONCURRENCY=16: doubles parallel judges to ~8 judges/min throughput
        #   (was 8 → ~4/min). If Azure deployment 429s appear in run logs, drop to 12.
        # - JUDGE_HTTP_TIMEOUT_SEC=90: most calls return in 10-30s; a 300s timeout means
        #   one stuck call holds a worker for 5min. 90s frees workers 3x faster.
        # - LANGFUSE_TIMEOUT=20: covers both score-REST writes and any residual OTLP.
        # - LANGFUSE_TRACING_ENABLED=false: disables unused OTLP exporter (SDK v3).
        # - EVAL_MAX_RUNTIME_SEC=0: no soft cap; eval runs to completion (or GH 10h kill).
        env:
          AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
          AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
          AZURE_API_VERSION: ${{ secrets.AZURE_API_VERSION }}
          DEPLOYMENT_NAME: ${{ secrets.DEPLOYMENT_NAME }}
          METABASE_URL: ${{ secrets.METABASE_URL }}
          METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
          METABASE_QUESTION_ID: ${{ secrets.METABASE_QUESTION_ID }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
          # SDK HTTP timeout (seconds). Default is 5s, which is too tight under
          # transient Langfuse Cloud slowness — bump to 20s. Applies to score
          # REST writes (OTLP export is disabled below).
          # Bumped 20 → 120s: SDK HTTP timeout for score REST writes. The
          # previous 20s was tight enough that incident-day Langfuse Cloud
          # slowness (60–90s p95) caused score-write retries to compound.
          LANGFUSE_TIMEOUT: "120"
          # Disable the SDK's auto-initialised OTLP trace exporter. We never call
          # @observe() so it produces no useful signal, only "Failed to export
          # span batch due to timeout (read timeout=4.999s)" noise. Score writes
          # via langfuse.create_score() use a separate REST path and are unaffected.
          # See https://github.com/langfuse/langfuse-python/blob/v3.7.0/langfuse/_client/environment_variables.py
          LANGFUSE_TRACING_ENABLED: "false"
          SLACK_WEBHOOK_URL: ${{ github.event_name == 'schedule' && secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL_TEST }}
          SLACK_TARGET: ${{ github.event_name == 'schedule' && 'prod' || 'staging' }}
          # Bumped 90 → 300s: per-LLM-call HTTP timeout in judge_runner. A 90s
          # cap meant a single sticky Azure call would error out (ERROR sample)
          # rather than ride out a transient slow response. With 300s + the
          # existing 16-way concurrency, one stuck worker holds for 5 min max.
          JUDGE_HTTP_TIMEOUT_SEC: "300"
          # Concurrent LLM calls on this runner (ThreadPoolExecutor); raise to speed up large daily samples.
          JUDGE_CONCURRENCY: "16"
          # 0 = no soft cap; run until all rows judged. The job's timeout-minutes: 600
          # (10h) above is the runaway backstop, not a target. Previously 14400 (4h),
          # but daily-eval has no hard duration requirement — let it run to completion.
          EVAL_MAX_RUNTIME_SEC: "0"

      # Guarantee a digest-readable JSON on disk so the artifact is never stale/missing keys
      # (digest C12 + upload both rely on this path).
      - name: Normalize or create eval snapshot for artifact
        if: always()
        run: |
          python3 <<'PY'
          import json
          import sys
          from datetime import date
          from pathlib import Path

          sys.path.insert(0, ".")
          p = Path("/tmp/daily_eval_yesterday_summary.json")
          y = date.fromordinal(date.today().toordinal() - 1).isoformat()

          def write_minimal():
              from daily_eval import write_minimal_eval_snapshot

              write_minimal_eval_snapshot(
                  str(p), yesterday_str=y, reason="eval_job_no_snapshot_on_disk"
              )

          if p.is_file() and p.stat().st_size > 2:
              try:
                  d = json.loads(p.read_text())
              except Exception:
                  write_minimal()
                  raise SystemExit(0)
              if isinstance(d, dict):
                  d.setdefault("formatting_hotspot_chapters", [])
                  if "n_sampled" not in d and "n_metabase_rows" in d:
                      d["n_sampled"] = d["n_metabase_rows"]
                  p.write_text(json.dumps(d, indent=2))
              raise SystemExit(0)

          write_minimal()
          PY

      - name: Upload eval summary for digest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-summary
          path: /tmp/daily_eval_yesterday_summary.json
          if-no-files-found: ignore
          retention-days: 2

  classifier:
    name: Free-text Classifier
    needs: eval
    if: always()
    runs-on: self-hosted
    # Bumped 30 → 60 to match the bumped FEEDBACK/JUDGE timeouts: a single
    # stuck Azure call can now hold a worker for up to 5 min, and the
    # classifier fans out across 8 workers; 30 min was tight under that load.
    timeout-minutes: 60
    env:
      AZURE_ENDPOINT: ${{ secrets.AZURE_ENDPOINT }}
      AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
      AZURE_API_VERSION: ${{ secrets.AZURE_API_VERSION }}
      DEPLOYMENT_NAME: ${{ secrets.DEPLOYMENT_NAME }}
      METABASE_URL: ${{ secrets.METABASE_URL }}
      METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
      METABASE_FREETEXT_CARD_ID: ${{ secrets.METABASE_FREETEXT_CARD_ID }}
      LANGFUSE_TIMEOUT: "120"
      LANGFUSE_TRACING_ENABLED: "false"
      JUDGE_CONCURRENCY: "8"
      # NOTE: the classifier imports `get_openai_client` from judge_runner, which
      # reads JUDGE_HTTP_TIMEOUT_SEC (NOT the FEEDBACK_* var, which is currently
      # dead — see daily_feedback_classifier._http_timeout_sec). The 240s default
      # in judge_runner was effectively in force here; we now make it explicit
      # at 300s so the classifier matches eval-job semantics.
      JUDGE_HTTP_TIMEOUT_SEC: "300"
      # Kept (and bumped 30 → 120) for future wire-up once the classifier
      # threads its own timeout into the OpenAI client instead of inheriting
      # the judge_runner default.
      FEEDBACK_CLASSIFIER_HTTP_TIMEOUT_SEC: "120"
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip3 install openai
      - name: Run classifier
        run: python3 daily_feedback_classifier.py
        continue-on-error: true
      - name: Upload classification snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feedback-classifications
          path: /tmp/daily_feedback_classifications.json
          if-no-files-found: ignore
          retention-days: 2

  digest:
    name: Daily Digest
    needs: [eval, classifier]
    runs-on: self-hosted
    if: always()
    # Bumped 180 → 240 to absorb the new max retry-tail budget: digest-card
    # backoff (~5 min) × multiple Metabase cards + Langfuse 8-attempt loop
    # (~8.5 min cumulative) + Slack 5s retry could push a degraded run past
    # 3h on a bad day. 240 min keeps slack while still bounded.
    timeout-minutes: 240
    env:
      PYTHONUNBUFFERED: "1"
      METABASE_URL: ${{ secrets.METABASE_URL }}
      METABASE_API_KEY: ${{ secrets.METABASE_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_HOST: ${{ secrets.LANGFUSE_HOST }}
      # SDK HTTP timeout (seconds) — see eval job env above for rationale.
      LANGFUSE_TIMEOUT: "120"
      # Disable OTLP trace exporter — see eval job env above for rationale.
      LANGFUSE_TRACING_ENABLED: "false"
      SLACK_WEBHOOK_URL: ${{ github.event_name == 'schedule' && secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK_URL_TEST }}
      SLACK_TARGET: ${{ github.event_name == 'schedule' && 'prod' || 'staging' }}
      METABASE_BEHAVIOR_FOLLOWUP_CARD_ID: ${{ secrets.METABASE_BEHAVIOR_FOLLOWUP_CARD_ID }}
      METABASE_BEHAVIOR_REPHRASE_CARD_ID: ${{ secrets.METABASE_BEHAVIOR_REPHRASE_CARD_ID }}
      METABASE_STREAM_LOGS_CARD_ID: ${{ secrets.METABASE_STREAM_LOGS_CARD_ID }}
      # Flipped 1 → 0 (2026-05-12): the strict gate was the proximate cause of
      # yesterday's silent miss — one slow Langfuse page fail-fasted the whole
      # job. We now PREFER a degraded Slack post (with `_fetch failed_` filler)
      # over no post. Worst-case landing slips from ~10:00 IST to ~11:30 IST.
      DIGEST_FAIL_ON_LANGFUSE_ERROR: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Show Slack target
        run: |
          echo "📨 Slack target: $(echo "$SLACK_TARGET" | tr '[:lower:]' '[:upper:]') (event: ${{ github.event_name }})"

      - name: Download classification snapshot (optional)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: feedback-classifications
          path: /tmp/feedback_classification_download
      - name: Place classification snapshot for digest read
        if: always()
        shell: bash
        run: |
          src="/tmp/feedback_classification_download/daily_feedback_classifications.json"
          if [[ -f "$src" ]]; then
            cp "$src" "/tmp/daily_feedback_classifications.json"
            echo "[info] Classifier snapshot placed at /tmp/daily_feedback_classifications.json"
          else
            echo "[info] No classifier snapshot — digest will skip the new section"
          fi

      - name: Download eval summary
        # The eval job may be cancelled mid-run (e.g. runner network drops on VPN reconnect),
        # in which case actions/upload-artifact returns 403 and no artifact exists. The
        # subsequent "Run daily digest" step has a fallback that reads the snapshot from
        # /tmp/daily_eval_yesterday_summary.json directly on the same self-hosted runner.
        # `continue-on-error: true` ensures the fallback path actually runs.
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: eval-summary
          path: eval_snapshot

      - name: Verify behaviour Metabase env (values not printed)
        shell: bash
        run: |
          check_digits_if_set() {
            name="$1"
            raw="${!name}"
            stripped="${raw#"${raw%%[![:space:]]*}"}"
            stripped="${stripped%"${stripped##*[![:space:]]}"}"
            if [[ -z "$stripped" ]]; then
              return
            fi
            if ! [[ "$stripped" =~ ^[0-9]+$ ]]; then
              echo "::warning::${name} must be digits-only (Metabase card id). Check the secret value for quotes or hidden characters."
            fi
          }
          check_digits_if_set METABASE_BEHAVIOR_FOLLOWUP_CARD_ID
          check_digits_if_set METABASE_BEHAVIOR_REPHRASE_CARD_ID
          check_digits_if_set METABASE_STREAM_LOGS_CARD_ID

      - name: Run daily digest
        shell: bash
        run: |
          SUMMARY="${GITHUB_WORKSPACE}/eval_snapshot/daily_eval_yesterday_summary.json"
          if [[ -f "$SUMMARY" ]]; then
            export EVAL_SUMMARY_PATH="$SUMMARY"
            echo "[info] Using eval snapshot from artifact: $EVAL_SUMMARY_PATH"
          else
            export EVAL_SUMMARY_PATH="/tmp/daily_eval_yesterday_summary.json"
            echo "[warn] No eval artifact; falling back to $EVAL_SUMMARY_PATH"
          fi
          python3 daily_digest.py
